<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ব্যানার ম্যানেজমেন্ট - অ্যাডমিন প্যানেল</title>
    <link rel="stylesheet" href="../css/admin-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="admin-container">
        <aside class="admin-sidebar">
            <div class="admin-logo">
                <i class="fas fa-tachometer-alt"></i>
                <h2>অ্যাডমিন</h2>
            </div>
            <nav class="admin-nav">
                <a href="index.html" class="nav-item">
                    <i class="fas fa-chart-line"></i> ড্যাশবোর্ড
                </a>
                <a href="products.html" class="nav-item">
                    <i class="fas fa-box"></i> পণ্য ম্যানেজমেন্ট
                </a>
                <a href="banners.html" class="nav-item active">
                    <i class="fas fa-image"></i> ব্যানার ম্যানেজমেন্ট
                </a>
                <a href="orders.html" class="nav-item">
                    <i class="fas fa-shopping-bag"></i> অর্ডার ম্যানেজমেন্ট
                </a>
                <a href="users.html" class="nav-item">
                    <i class="fas fa-users"></i> ইউজার ম্যানেজমেন্ট
                </a>
                <a href="payments.html" class="nav-item">
                    <i class="fas fa-credit-card"></i> পেমেন্ট সেটিংস
                </a>
                <a href="settings.html" class="nav-item">
                    <i class="fas fa-cog"></i> ওয়েবসাইট সেটিংস
                </a>
                <a href="#" class="nav-item" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i> লগআউট
                </a>
            </nav>
        </aside>

        <main class="admin-main">
            <div class="admin-topbar">
                <div class="topbar-left">
                    <button class="sidebar-toggle" id="sidebarToggle">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1>ব্যানার ম্যানেজমেন্ট</h1>
                </div>
                <div class="topbar-right">
                    <button class="btn btn-primary" id="addBannerBtn">
                        <i class="fas fa-plus"></i> নতুন ব্যানার যোগ করুন
                    </button>
                </div>
            </div>

            <div class="admin-content">
                <div class="admin-card">
                    <div class="card-header">
                        <h2>সমস্ত ব্যানার</h2>
                    </div>
                    <div class="card-body">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>আইডি</th>
                                    <th>শিরোনাম</th>
                                    <th>ছবি</th>
                                    <th>অবস্থা</th>
                                    <th>কার্যকলাপ</th>
                                </tr>
                            </thead>
                            <tbody id="bannersList">
                                <tr><td colspan="5" style="text-align: center; padding: 20px;">লোডিং হচ্ছে...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add Banner Modal -->
    <div class="modal" id="bannerModal">
        <div class="modal-content" style="max-width: 600px;">
            <span class="close" id="closeBannerModal">&times;</span>
            <h2>ব্যানার যোগ করুন</h2>
            <form id="bannerForm">
                <div class="form-group">
                    <label>ব্যানারের শিরোনাম *</label>
                    <input type="text" class="form-input" id="bannerTitle" required>
                </div>
                <div class="form-group">
                    <label>ব্যানারের ছবি *</label>
                    <input type="file" class="form-input" id="bannerImage" accept="image/*" required>
                </div>
                <div class="form-group">
                    <label>ছবির লিঙ্ক</label>
                    <input type="url" class="form-input" id="bannerLink">
                </div>
                <button type="submit" class="btn btn-primary btn-block">ব্যানার যোগ করুন</button>
            </form>
        </div>
    </div>

    <script>
        if (!localStorage.getItem('adminToken')) {
            window.location.href = 'login.html';
        }

        const bannerModal = document.getElementById('bannerModal');
        const addBannerBtn = document.getElementById('addBannerBtn');
        const closeBannerModal = document.getElementById('closeBannerModal');
        const logoutBtn = document.getElementById('logoutBtn');

        addBannerBtn.addEventListener('click', () => {
            bannerModal.style.display = 'block';
        });

        closeBannerModal.addEventListener('click', () => {
            bannerModal.style.display = 'none';
        });

        window.addEventListener('click', (e) => {
            if (e.target === bannerModal) {
                bannerModal.style.display = 'none';
            }
        });

        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('adminToken');
            window.location.href = 'login.html';
        });

        document.getElementById('sidebarToggle').addEventListener('click', () => {
            document.querySelector('.admin-sidebar').classList.toggle('active');
        });

        async function loadBanners() {
            try {
                const response = await fetch('../backend/api/banners.php');
                const banners = await response.json();

                const list = document.getElementById('bannersList');
                if (!banners || banners.length === 0) {
                    list.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 20px;">কোনো ব্যানার নেই</td></tr>';
                } else {
                    list.innerHTML = banners.map(banner => `
                        <tr>
                            <td>${banner.id}</td>
                            <td>${banner.title}</td>
                            <td><img src="${banner.image}" style="height: 40px; border-radius: 3px;"></td>
                            <td><span class="badge badge-${banner.status}">${banner.status}</span></td>
                            <td>
                                <button class="btn-sm btn-edit" onclick="editBanner(${banner.id})">সংশোধন</button>
                                <button class="btn-sm btn-danger" onclick="deleteBanner(${banner.id})">সরাই</button>
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading banners:', error);
            }
        }

        document.getElementById('bannerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            alert('ব্যানার যোগ সফল');
            bannerModal.style.display = 'none';
            loadBanners();
        });

        function editBanner(id) {
            alert('ব্যানার সংশোধন ' + id);
        }

        function deleteBanner(id) {
            if (confirm('আপনি কি নিশ্চিত? অবশ্যই হয়েছে।')) {
                alert('ব্যানার ' + id + ' সরানো হয়েছে');
                loadBanners();
            }
        }

        document.addEventListener('DOMContentLoaded', loadBanners);
    </script>
</body>
</html>
