<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অর্ডার ম্যানেজমেন্ট - অ্যাডমিন প্যানেল</title>
    <link rel="stylesheet" href="../css/admin-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="admin-container">
        <aside class="admin-sidebar">
            <div class="admin-logo">
                <i class="fas fa-tachometer-alt"></i>
                <h2>অ্যাডমিন</h2>
            </div>
            <nav class="admin-nav">
                <a href="index.html" class="nav-item">
                    <i class="fas fa-chart-line"></i> ড্যাশবোর্ড
                </a>
                <a href="products.html" class="nav-item">
                    <i class="fas fa-box"></i> পণ্য ম্যানেজমেন্ট
                </a>
                <a href="banners.html" class="nav-item">
                    <i class="fas fa-image"></i> ব্যানার ম্যানেজমেন্ট
                </a>
                <a href="orders.html" class="nav-item active">
                    <i class="fas fa-shopping-bag"></i> অর্ডার ম্যানেজমেন্ট
                </a>
                <a href="users.html" class="nav-item">
                    <i class="fas fa-users"></i> ইউজার ম্যানেজমেন্ট
                </a>
                <a href="payments.html" class="nav-item">
                    <i class="fas fa-credit-card"></i> পেমেন্ট সেটিংস
                </a>
                <a href="settings.html" class="nav-item">
                    <i class="fas fa-cog"></i> ওয়েবসাইট সেটিংস
                </a>
                <a href="#" class="nav-item" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i> লগআউট
                </a>
            </nav>
        </aside>

        <main class="admin-main">
            <div class="admin-topbar">
                <div class="topbar-left">
                    <button class="sidebar-toggle" id="sidebarToggle">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1>অর্ডার ম্যানেজমেন্ট</h1>
                </div>
            </div>

            <div class="admin-content">
                <div class="admin-card">
                    <div class="card-header">
                        <h2>সমস্ত অর্ডার</h2>
                        <div style="display: flex; gap: 10px;">
                            <select id="statusFilter" style="padding: 8px 12px; border: 1px solid #ddd; border-radius: 5px;">
                                <option value="all">সব অবস্থা</option>
                                <option value="pending">লংবিত</option>
                                <option value="processing">প্রক্রিয়াকরণ</option>
                                <option value="completed">সম্পন্ন</option>
                                <option value="cancelled">বাতিল</option>
                            </select>
                        </div>
                    </div>
                    <div class="card-body">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>অর্ডার ID</th>
                                    <th>গ্রাহক</th>
                                    <th>ইমেল</th>
                                    <th>মোট</th>
                                    <th>অবস্থা</th>
                                    <th>তারিখ</th>
                                    <th>কার্যকলাপ</th>
                                </tr>
                            </thead>
                            <tbody id="ordersList">
                                <tr><td colspan="7" style="text-align: center; padding: 20px;">লোডিং হচ্ছে...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Order Details Modal -->
    <div class="modal" id="orderModal">
        <div class="modal-content" style="max-width: 600px;">
            <span class="close" id="closeOrderModal">&times;</span>
            <h2>অর্ডার বিবরণ</h2>
            <div id="orderDetails"></div>
            <div style="margin-top: 20px;">
                <label>অর্ডার অবস্থা</label>
                <select id="orderStatus" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; margin-top: 5px;">
                    <option value="pending">লংবিত</option>
                    <option value="processing">প্রক্রিয়াকরণ</option>
                    <option value="completed">সম্পন্ন</option>
                    <option value="cancelled">বাতিল</option>
                </select>
            </div>
            <button class="btn btn-primary btn-block" style="margin-top: 15px;" onclick="updateOrderStatus()">আপডেট করুন</button>
            <button class="btn btn-outline btn-block" style="margin-top: 10px;" onclick="printInvoice()">ইনভয়েস প্রিন্ট করুন</button>
        </div>
    </div>

    <script>
        if (!localStorage.getItem('adminToken')) {
            window.location.href = 'login.html';
        }

        const orderModal = document.getElementById('orderModal');
        const closeOrderModal = document.getElementById('closeOrderModal');
        const logoutBtn = document.getElementById('logoutBtn');
        let currentOrderId = null;

        closeOrderModal.addEventListener('click', () => {
            orderModal.style.display = 'none';
        });

        window.addEventListener('click', (e) => {
            if (e.target === orderModal) {
                orderModal.style.display = 'none';
            }
        });

        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('adminToken');
            window.location.href = 'login.html';
        });

        document.getElementById('sidebarToggle').addEventListener('click', () => {
            document.querySelector('.admin-sidebar').classList.toggle('active');
        });

        document.getElementById('statusFilter').addEventListener('change', loadOrders);

        async function loadOrders() {
            try {
                const status = document.getElementById('statusFilter').value;
                let url = '../backend/api/orders.php';
                if (status !== 'all') {
                    url += '?status=' + status;
                }

                const response = await fetch(url);
                const orders = await response.json();

                const list = document.getElementById('ordersList');
                if (!orders || orders.length === 0) {
                    list.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 20px;">কোনো অর্ডার নেই</td></tr>';
                } else {
                    list.innerHTML = orders.map(order => `
                        <tr>
                            <td>#${order.id}</td>
                            <td>${order.customer_name}</td>
                            <td>${order.customer_email}</td>
                            <td>৳ ${order.total}</td>
                            <td><span class="badge badge-${order.status}">${order.status}</span></td>
                            <td>${new Date(order.created_at).toLocaleDateString('bn-BD')}</td>
                            <td>
                                <button class="btn-sm btn-edit" onclick="viewOrder(${order.id})">দেখুন</button>
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading orders:', error);
            }
        }

        function viewOrder(id) {
            currentOrderId = id;
            const details = `
                <p><strong>অর্ডার ID:</strong> #${id}</p>
                <p><strong>গ্রাহক:</strong> রহিম আহমেদ</p>
                <p><strong>ইমেল:</strong> rahim@example.com</p>
                <p><strong>ফোন:</strong> +8801712345678</p>
                <p><strong>ঠিকানা:</strong> ঢাকা, বাংলাদেশ</p>
                <p><strong>মোট:</strong> ৳ 5000</p>
            `;
            document.getElementById('orderDetails').innerHTML = details;
            orderModal.style.display = 'block';
        }

        function updateOrderStatus() {
            const status = document.getElementById('orderStatus').value;
            alert('অর্ডার অবস্থা আপডেট হয়েছে: ' + status);
            orderModal.style.display = 'none';
            loadOrders();
        }

        function printInvoice() {
            alert('ইনভয়েস প্রিন্ট হচ্ছে...');
            window.print();
        }

        document.addEventListener('DOMContentLoaded', loadOrders);
    </script>
</body>
</html>
