<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>পেমেন্ট সেটিংস - অ্যাডমিন প্যানেল</title>
    <link rel="stylesheet" href="../css/admin-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="admin-container">
        <aside class="admin-sidebar">
            <div class="admin-logo">
                <i class="fas fa-tachometer-alt"></i>
                <h2>অ্যাডমিন</h2>
            </div>
            <nav class="admin-nav">
                <a href="index.html" class="nav-item">
                    <i class="fas fa-chart-line"></i> ড্যাশবোর্ড
                </a>
                <a href="products.html" class="nav-item">
                    <i class="fas fa-box"></i> পণ্য ম্যানেজমেন্ট
                </a>
                <a href="banners.html" class="nav-item">
                    <i class="fas fa-image"></i> ব্যানার ম্যানেজমেন্ট
                </a>
                <a href="orders.html" class="nav-item">
                    <i class="fas fa-shopping-bag"></i> অর্ডার ম্যানেজমেন্ট
                </a>
                <a href="users.html" class="nav-item">
                    <i class="fas fa-users"></i> ইউজার ম্যানেজমেন্ট
                </a>
                <a href="payments.html" class="nav-item active">
                    <i class="fas fa-credit-card"></i> পেমেন্ট সেটিংস
                </a>
                <a href="settings.html" class="nav-item">
                    <i class="fas fa-cog"></i> ওয়েবসাইট সেটিংস
                </a>
                <a href="#" class="nav-item" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i> লগআউট
                </a>
            </nav>
        </aside>

        <main class="admin-main">
            <div class="admin-topbar">
                <div class="topbar-left">
                    <button class="sidebar-toggle" id="sidebarToggle">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1>পেমেন্ট গেটওয়ে সেটিংস</h1>
                </div>
            </div>

            <div class="admin-content">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <!-- bKash Settings -->
                    <div class="admin-card">
                        <div class="card-header">
                            <h2>bKash সেটিংস</h2>
                        </div>
                        <div class="card-body">
                            <form class="payment-form">
                                <div class="form-group">
                                    <label>API কী</label>
                                    <input type="text" class="form-input" placeholder="আপনার API কী">
                                </div>
                                <div class="form-group">
                                    <label>সিক্রেট কী</label>
                                    <input type="password" class="form-input" placeholder="আপনার সিক্রেট কী">
                                </div>
                                <div class="form-group">
                                    <label>Webhook URL</label>
                                    <input type="url" class="form-input" placeholder="Webhook URL">
                                </div>
                                <button type="button" class="btn btn-primary btn-block">সংরক্ষণ করুন</button>
                            </form>
                        </div>
                    </div>

                    <!-- Nagad Settings -->
                    <div class="admin-card">
                        <div class="card-header">
                            <h2>Nagad সেটিংস</h2>
                        </div>
                        <div class="card-body">
                            <form class="payment-form">
                                <div class="form-group">
                                    <label>API কী</label>
                                    <input type="text" class="form-input" placeholder="আপনার API কী">
                                </div>
                                <div class="form-group">
                                    <label>সিক্রেট কী</label>
                                    <input type="password" class="form-input" placeholder="আপনার সিক্রেট কী">
                                </div>
                                <div class="form-group">
                                    <label>Webhook URL</label>
                                    <input type="url" class="form-input" placeholder="Webhook URL">
                                </div>
                                <button type="button" class="btn btn-primary btn-block">সংরক্ষণ করুন</button>
                            </form>
                        </div>
                    </div>

                    <!-- Rocket Settings -->
                    <div class="admin-card">
                        <div class="card-header">
                            <h2>Rocket সেটিংস</h2>
                        </div>
                        <div class="card-body">
                            <form class="payment-form">
                                <div class="form-group">
                                    <label>API কী</label>
                                    <input type="text" class="form-input" placeholder="আপনার API কী">
                                </div>
                                <div class="form-group">
                                    <label>সিক্রেট কী</label>
                                    <input type="password" class="form-input" placeholder="আপনার সিক্রেট কী">
                                </div>
                                <div class="form-group">
                                    <label>Webhook URL</label>
                                    <input type="url" class="form-input" placeholder="Webhook URL">
                                </div>
                                <button type="button" class="btn btn-primary btn-block">সংরক্ষণ করুন</button>
                            </form>
                        </div>
                    </div>

                    <!-- Card Gateway Settings -->
                    <div class="admin-card">
                        <div class="card-header">
                            <h2>কার্ড গেটওয়ে সেটিংস</h2>
                        </div>
                        <div class="card-body">
                            <form class="payment-form">
                                <div class="form-group">
                                    <label>API কী</label>
                                    <input type="text" class="form-input" placeholder="আপনার API কী">
                                </div>
                                <div class="form-group">
                                    <label>সিক্রেট কী</label>
                                    <input type="password" class="form-input" placeholder="আপনার সিক্রেট কী">
                                </div>
                                <div class="form-group">
                                    <label>Webhook URL</label>
                                    <input type="url" class="form-input" placeholder="Webhook URL">
                                </div>
                                <button type="button" class="btn btn-primary btn-block">সংরক্ষণ করুন</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        if (!localStorage.getItem('adminToken')) {
            window.location.href = 'login.html';
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('adminToken');
            window.location.href = 'login.html';
        });

        document.getElementById('sidebarToggle').addEventListener('click', () => {
            document.querySelector('.admin-sidebar').classList.toggle('active');
        });

        document.querySelectorAll('.payment-form').forEach(form => {
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                alert('সেটিংস সংরক্ষণ করা হয়েছে');
            });
        });

        document.querySelectorAll('button[type="button"]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                alert('সেটিংস সংরক্ষণ করা হয়েছে');
            });
        });
    </script>
</body>
</html>
